name: Build and Release DMG

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipx and venvstacks
        run: |
          python3 -m pip install --upgrade pipx
          python3 -m pipx ensurepath
          python3 -m pipx install venvstacks

      - name: Cache venvstacks build
        uses: actions/cache@v4
        with:
          path: |
            packaging/_build
            packaging/_export
            packaging/_wheels
            packaging/requirements
          key: venvstacks-macos-py311-${{ hashFiles('packaging/venvstacks.toml') }}
          restore-keys: |
            venvstacks-macos-py311-

      - name: Build DMG
        run: |
          export PIP_INDEX_URL="https://pypi.org/simple/"
          export PIP_EXTRA_INDEX_URL=""
          export PATH="$HOME/.local/bin:$PATH"
          python3 packaging/build.py

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/oMLX-*.dmg

